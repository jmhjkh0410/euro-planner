name: Patch index.html

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply patches
        run: |
          sed -i "s/sessionStorage\.setItem('EURO_USER_CODE', normalizedCode);/localStorage.setItem('EURO_USER_CODE', normalizedCode);/g" index.html
          sed -i "s/const savedCode = sessionStorage\.getItem('EURO_USER_CODE');/const savedCode = localStorage.getItem('EURO_USER_CODE');/g" index.html
          sed -i 's/accept="image\/\*" onchange="handleUpload/accept="image\/*,application\/pdf,.pdf" onchange="handleUpload/g' index.html

          python3 - <<'PYEOF'
with open('index.html', 'r', encoding='utf-8') as f:
    html = f.read()

old = """    if (currentUser) {
        const localChecks = localStorage.getItem(FB_LOCAL_CHECKS + '_' + currentUser);
        if (localChecks) { try { _applyChecksState(JSON.parse(localChecks)); } catch(e) {} }
    }"""

new = "    // checks 로컬 캐시 제거 → Firebase 실시간만 사용"

if old in html:
    html = html.replace(old, new)
    print('✅ checks 로컬 캐시 제거 완료')
else:
    print('⚠️ 패턴 못 찾음')

with open('index.html', 'w', encoding='utf-8') as f:
    f.write(html)
PYEOF

          echo "✅ 패치 완료"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "fix: checks 로컬캐시 제거로 기기​​​​​​​​​​​​​​​​

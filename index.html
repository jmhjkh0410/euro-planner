// 장소명으로 보기에 적합한 키워드인지 판단
// 교통수단, 숙소복귀, 식사 등 애매한 건 제외
const MAP_EXCLUDE_PATTERNS = [
    /^숙소/, /복귀$/, /^호텔/, /^체크/, /^이동/, /^출발/, /^도착/,
    /^기차/, /^버스/, /^비행/, /^공항/, /^환승/, /^짐/,
    /^아침/, /^점심/, /^저녁/, /^식사/, /^휴식/, /^자유/,
    /^준비/, /^정리/, /^팁:/, /^\d+일차/,
];

function shouldShowMap(title, taskId) {
    // 좌표가 있는 항목은 항상 지도 표시
    if (taskId && PLACE_COORDS[taskId]) return true;
    if (!title || title.trim().length < 3) return false;
    const t = title.trim();
    for (const p of MAP_EXCLUDE_PATTERNS) {
        if (p.test(t)) return false;
    }
    return true;
}

function getMapQuery(taskId, title) {
    // 좌표 데이터가 있으면 영문 장소명 사용
    const c = PLACE_COORDS[taskId];
    if (c && c.en) return c.en;
    return title.trim();
}

function getMapUrl(taskId, title) {
    const c = PLACE_COORDS[taskId];
    if (c) {
        // 좌표가 있으면 좌표 + 영문명으로 정확한 위치 지정
        return `https://www.google.com/maps/search/?api=1&query=${c.lat},${c.lng}&query_place_id=`;
    }
    return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(getMapQuery(taskId, title))}`;
}

function getMapLink(title, desc) {
    // innerHTML에 넣지 않음 - 빈 placeholder만 반환
    // 실제 버튼은 makeTaskEl에서 DOM으로 직접 추가
    return shouldShowMap(title) ? '<span class="map-btn-placeholder"></span>' : '';
}

// ── 일일 동선 지도 (Leaflet.js) ──────────────────────────────
let _dayMapInstance = null;

// ── Leaflet 동적 로딩 ──
let _leafletLoaded = false;
let _leafletLoading = false;
function _loadLeaflet(cb) {
    if (_leafletLoaded && typeof L !== 'undefined') { cb(); return; }
    if (_leafletLoading) { setTimeout(() => _loadLeaflet(cb), 200); return; }
    _leafletLoading = true;
    const css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
    document.head.appendChild(css);
    const js = document.createElement('script');
    js.src = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    js.onload = () => { _leafletLoaded = true; _leafletLoading = false; cb(); };
    js.onerror = () => { _leafletLoading = false; alert('지도 라이브러리 로딩 실패. 네트워크를 확인해주세요.'); };
    document.head.appendChild(js);
}

function openDayMap(catKey, dk) {
    const td = appState.itinerary;
    const allTasks = getStructureArr(td.structure, catKey);
    const tasks = allTasks.filter(t => {
        const raw = t._dk !== undefined ? t._dk : getDKfromId(t.id);
        return String(raw) === String(dk);
    });

    // 좌표 있는 항목만 필터
    const pts = [];
    tasks.forEach((t, i) => {
        const c = PLACE_COORDS[t.id];
        if (c) pts.push({ lat: c.lat, lng: c.lng, en: c.en, title: t.title, time: t._time || '', idx: pts.length + 1 });
    });

    if (pts.length === 0) {
        alert('이 날의 좌표 데이터가 없습니다.');
        return;
    }

    // 숙소 키 매핑
    const accomKeyMap = {
        budapest:'budapest', wien:'wien', krakow:'krakow', berlin:'berlin',
        munich:'munich', swiss:'swiss', swiss_b:'swiss', milano:'milano',
        nice:'nice', nice_b:'nice', paris1:'paris1', paris2:'paris2',
        london:'london', london_b:'london'
    };
    const accomKey = accomKeyMap[catKey] || catKey;
    const accom = appState.accommodations?.[accomKey];
    const label = getDKLabel(dk, allTasks, catKey);

    // 모달 먼저 표시 (로딩 상태)
    const overlay = document.createElement('div');
    overlay.className = 'map-modal-overlay';
    overlay.id = 'day-map-overlay';
    overlay.onclick = e => { if (e.target === overlay) closeDayMap(); };
    overlay.innerHTML = `
        <div class="map-modal">
            <div class="map-modal-header">
                <span class="map-modal-title">🗺 ${label} 동선</span>
                <button class="map-modal-close" onclick="closeDayMap()">✕</button>
            </div>
            <div id="map-container" style="display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:14px">지도 로딩 중...</div>
            <div class="map-modal-legend">
                <span class="map-legend-item"><span class="map-legend-dot" style="background:#3b82f6"></span> 일정 순서</span>
                ${accom ? '<span class="map-legend-item"><span class="map-legend-dot" style="background:#f59e0b"></span> 숙소</span>' : ''}
                <span class="map-legend-item" style="margin-left:auto;font-size:10px;opacity:.7">마커 클릭 → Google Maps</span>
            </div>
        </div>`;
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';

    // Leaflet 로드 후 지도 초기화
    _loadLeaflet(() => {
        const container = document.getElementById('map-container');
        if (!container) return;
        container.textContent = '';
        container.style = '';

        try {
            const map = L.map(container, { zoomControl: true, attributionControl: false });
            _dayMapInstance = map;

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 18
            }).addTo(map);

            const allLatLngs = [];
            const BLUE = '#3b82f6';

            pts.forEach(p => {
                const icon = L.divIcon({
                    className: 'leaflet-numbered-icon',
                    html: '<div style="background:'+BLUE+';width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35)">'+p.idx+'</div>',
                    iconSize: [28, 28],
                    iconAnchor: [14, 14],
                });
                const latlng = [p.lat, p.lng];
                allLatLngs.push(latlng);

                const timeLabel = p.time ? '<b>'+p.time+'</b> · ' : '';
                L.marker(latlng, { icon }).addTo(map).bindPopup(
                    '<div style="font-size:13px;min-width:160px">' +
                    '<div style="font-weight:700;margin-bottom:4px">'+p.idx+'. '+p.title+'</div>' +
                    '<div style="color:#666;font-size:11px;margin-bottom:6px">'+timeLabel+p.en+'</div>' +
                    '<a href="https://www.google.com/maps/search/?api=1&query='+p.lat+','+p.lng+'" target="_blank" rel="noopener" style="font-size:11px;color:#3b82f6">Google Maps에서 보기 →</a>' +
                    '</div>',
                    { closeButton: false, maxWidth: 240 }
                );
            });

            if (allLatLngs.length > 1) {
                L.polyline(allLatLngs, { color: BLUE, weight: 2.5, opacity: 0.6, dashArray: '8 6' }).addTo(map);
            }
            if (allLatLngs.length > 0) {
                map.fitBounds(L.latLngBounds(allLatLngs), { padding: [40, 40], maxZoom: 15 });
            }
        } catch (err) {
            container.textContent = '지도 초기화 실패: ' + err.message;
            console.error('[DayMap]', err);
        }
    });
}

function closeDayMap() {
    if (_dayMapInstance) { _dayMapInstance.remove(); _dayMapInstance = null; }
    const ov = document.getElementById('day-map-overlay');
    if (ov) ov.remove();
    document.body.style.overflow = '';
}

// ── EDIT MODE ─────────────────────────────────────────────
let editMode = false;
let selectedIds = new Set();

function toggleEditMode() {
    editMode = !editMode;
    document.body.classList.toggle('edit-mode', editMode);
    const fab = document.getElementById('fab-edit');
    fab.classList.toggle('active', editMode);
    // FAB 내용 업데이트 (badge 보존)
    const badge = fab.querySelector('.fab-badge');
    fab.innerHTML = editMode ? '✓' : '✏️';
    if (badge) fab.appendChild(badge);
    const tip = document.createElement('span');
    tip.className = 'fab-tooltip';
    tip.textContent = editMode ? '편집 종료' : '편집 모드';
    fab.appendChild(tip);

    if (!editMode) {
        selectedIds.clear();
        document.getElementById('edit-bar').classList.remove('visible');
        document.querySelectorAll('.task-item.selected').forEach(el => el.classList.remove('selected'));
    }
    // 현재 렌더된 item들 draggable 업데이트
    document.querySelectorAll('.task-item[data-tid]').forEach(el => { el.draggable = editMode; });
    updateEditBar();
}
function exitEditMode() { if (editMode) toggleEditMode(); }

function toggleSelect(taskId) {
    if (!editMode) return;
    const el = document.getElementById(`item-${taskId}`);
    if (selectedIds.has(taskId)) { selectedIds.delete(taskId); el?.classList.remove('selected'); }
    else { selectedIds.add(taskId); el?.classList.add('selected'); }
    updateEditBar();
}
function updateEditBar() {
    const bar = document.getElementById('edit-bar');
    if (editMode) {
        bar.classList.add('visible');
        const n = selectedIds.size;
        document.getElementById('edit-bar-count').textContent = n > 0 ? `${n}개 선택됨` : '항목을 선택하세요';
        document.getElementById('btn-bulk-delete').disabled = n === 0;
    } else {
        bar.classList.remove('visible');
    }
}
function bulkDelete() {
    if (!selectedIds.size) return;
    const tab = appState.activeTab, td = appState[tab];
    // 먼저 모든 대상을 수집 (splice 전에 인덱스 확보)
    const targets = [];
    selectedIds.forEach(id => {
        let found = findTaskInStructure(td.structure, id);
        let isPrivate = false;
        if (!found && td._private) {
            found = findTaskInStructure(td._private, id);
            isPrivate = true;
        }
        if (found) targets.push({ id, found, isPrivate });
    });
    // 같은 배열 내에서 뒤쪽 인덱스부터 splice (인덱스 꼬임 방지)
    targets.sort((a, b) => {
        if (a.found.arr === b.found.arr) return b.found.idx - a.found.idx;
        return 0;
    });
    targets.forEach(({ id, found, isPrivate }) => {
        const [task] = found.arr.splice(found.idx, 1);
        appState.trash.unshift({ ...task, fromTab:tab, fromCat:found.catKey, fromIdx:found.idx, deletedAt:Date.now(), fromPrivate:isPrivate });
        delete td.checks[id]; delete td.tickets[id];
    });
    selectedIds.clear();
    updateEditBar();
    save();
    renderContent();
    updateProgress();
    updateTrashFab();
}

function init() {
    // 0) 로그인 복원 (sessionStorage → localStorage로 변경: 앱 재시작 후에도 유지)
    const savedCode = localStorage.getItem('EURO_USER_CODE');
    if (savedCode && USER_CONFIG[savedCode]) {
        currentUser = savedCode;
        document.getElementById('pin-overlay').classList.add('hidden');
        if (savedCode === 'solo') soloSessionStructure = { reservations:{}, itinerary:{}, packing:{} };
        applyUserMode(savedCode);
    } else {
        _lockBodyScroll();
    }

    // 1) 로컬 캐시로 빠른 초기 렌더링 (structure만 — checks는 Firebase 수신 후 적용)
    const localStructure = localStorage.getItem(FB_LOCAL_STRUCTURE);
    if (localStructure) { try { _applyContentState(JSON.parse(localStructure)); } catch(e) { console.warn("[parse]", e); } }
    // ⚠️ checks 로컬 캐시 복원 제거 — Firebase 수신 시에만 적용 (기기간 동기화 안정성)
    // (solo는 Firebase에서 master checks를 읽어오므로 여기서 미리 적용하지 않음)

    _ensureAppState();
    switchTab(appState.activeTab || 'reservations');
    renderMobileNav();
    setSyncStatus('loading', '☁️ 동기화 중…');

    // 2) Firebase 연결
    if (window._fb) _startFirebaseSync();
    else {
        window.addEventListener('firebase-ready', _startFirebaseSync, { once: true });
        setTimeout(() => {
            if (!fbReady) setSyncStatus('error', '⚠️ 클라우드 미연결 (로컬 모드)');
        }, 5000);
    }
}

function _ensureAppState() {
    if (!appState.itinerary.cityOpen) appState.itinerary.cityOpen = {};
    if (!appState.itinerary.dayOpen)  appState.itinerary.dayOpen  = {};
    if (!appState.reservations.catOpen) appState.reservations.catOpen = {};
    if (!appState.packing.catOpen) appState.packing.catOpen = {};
    if (!appState.trash) appState.trash = [];
    ['reservations','itinerary','packing'].forEach(tab => {
        if (!appState[tab].tickets)   appState[tab].tickets   = {};
        if (!appState[tab].checks)    appState[tab].checks    = {};
        if (!appState[tab]._overrides) appState[tab]._overrides = {};
    });
}

// 동기화 상태 표시
function setSyncStatus(type, msg) {
    const el = document.getElementById('sync-status');
    if (!el) return;
    el.textContent = msg;
    el.className = 'sync-status sync-' + type;
}

    save();
    renderContent();
    updateProgress();
    updateTrashFab();

    if (editMode) document.querySelectorAll('.task-item[data-tid]').forEach(el => { el.draggable = true; });

function switchTab(tab) {
    appState.activeTab = tab;
    exitEditMode();
    // Firebase 초기 데이터 수신 후에만 save() 실행
    if (_fbDataReady) save();
    updateTabUI();
    renderSidebar();
    renderContent();
    updateProgress();
    renderMobileNav();
    loadWeather();
    window.scrollTo(0, 0);
    // 패스 탭: 편집 FAB 숨김 (읽기 전용)

function showTimeInput(taskId, catKey) {
    // 이미 인라인 입력 중이면 무시
    if (document.getElementById(`ti-${taskId}`)) return;
    const li = document.getElementById(`item-${taskId}`);
    if (!li) return;
    const td = appState[appState.activeTab];
    let task = null;
    for (const k in td.structure) { task = getStructureArr(td.structure, k).find(t => t.id === taskId); if (task) break; }
    // _private도 탐색 (cat/seo 추가 항목)
    if (!task && td._private) {
        for (const k in td._private) { task = (td._private[k] || []).find(t => t.id === taskId); if (task) break; }
    }
    if (!task) return;

    // 뱃지/버튼 자리를 인라인 input으로 교체
    const topRow = li.querySelector('.task-top-row');
    if (!topRow) return;
    const existing = topRow.querySelector('.task-time-badge, .btn-add-time');
    const input = document.createElement('input');
    input.type = 'time';
    input.id = `ti-${taskId}`;
    input.className = 'time-inline-input';
    input.value = task._time || '';
    if (existing) topRow.replaceChild(input, existing);
    else topRow.prepend(input);
    input.focus();

    const save = () => {
        const val = input.value;
        const uc = currentUser ? USER_CONFIG[currentUser] : null;
        const td = appState[appState.activeTab];
        const tab = appState.activeTab;

        // cat/seo가 마스터 항목 시간 변경 → _overrides에 저장
        const isInStructure = !!findTaskInStructure(td.structure, taskId);
        if (uc && uc.saveMode === 'private' && isInStructure) {
            if (!appState[tab]._overrides) appState[tab]._overrides = {};
            if (!appState[tab]._overrides[catKey]) appState[tab]._overrides[catKey] = {};
            const existing = appState[tab]._overrides[catKey][taskId] || {};
            appState[tab]._overrides[catKey][taskId] = { ...existing, _time: val || '' };
        } else {
            if (val) task._time = val; else delete task._time;
        }
        saveAndRender();
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); save(); } if (e.key === 'Escape') renderContent(); });
}

function formatMemoText(raw) {
    return raw
        .replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .split('\n')
        .map(line => {
            // 줄 끝이 콜론이거나 숫자. 제목으로 시작하는 줄 → 굵게
            if (/^(\d+\.|📝|📌|🏠|🚇|🚆|🚌|💡|⚠️|✅)/.test(line.trim()) || /:\s*$/.test(line.trim())) {
                return `<strong>${line}</strong>`;
            }
            return line;
        })
        .join('\n');
}

function renderAccommodation(container, catKey) {
    const accoms = appState.accommodations || {};
    // catKey 매핑 (swiss/swiss_b → frutigen, london/london_b → london 등)
    const keyMap = {
        swiss: 'swiss', swiss_b: 'swiss',
        london: 'london', london_b: 'london',
        paris1: 'paris1', paris2: 'paris2',
        nice_b: 'nice'
    };
    const lookupKey = keyMap[catKey] || catKey;
    const info = accoms[lookupKey];
    if (!info || !info.address) return;

    const chip = document.createElement('div');
    chip.className = 'accom-chip';
    chip.innerHTML = `
        <span class="accom-icon">🏠</span>
        <div class="accom-info">
            <span class="accom-city">${info.city || ''} ${(()=>{
            const d = info.dates || (info.checkin && info.checkout ? (() => {
                const fmt = s => { const m=String(s).match(/(\d{4})[./-](\d{1,2})[./-](\d{1,2})/); return m ? m[2]+'/'+String(m[3]).padStart(2,'0') : s; };
                return fmt(info.checkin)+' ~ '+fmt(info.checkout);
            })() : '');
            return d ? '<span class=\"accom-dates\">'+d+'</span>' : '';
        })()}</span>
            <span class="accom-address">${info.address}</span>
        </div>
        ${info.nights ? `<span class="accom-nights">${info.nights}</span>` : ''}
    `;
    // 숙소 지도 버튼 - DOM 직접 생성
    const accomMapBtn = document.createElement('button');
    accomMapBtn.type = 'button';
    accomMapBtn.className = 'btn-map';
    accomMapBtn.style.cssText = 'position:static;margin-left:4px;flex-shrink:0';
    accomMapBtn.textContent = '🗺 지도';
    const accomQuery = encodeURIComponent((info.address || info.city || '').trim());
    const accomUrl = 'https://www.google.com/maps/search/?api=1&query=' + accomQuery;
    accomMapBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        e.preventDefault();
        window.open(accomUrl, '_blank');

    });
    chip.appendChild(accomMapBtn);
    container.appendChild(chip);
}

function toggleCityMemo(catKey) {
    if (!appState.cityMemos) appState.cityMemos = {};
    const key = `${catKey}__open`;
    appState.cityMemos[key] = !appState.cityMemos[key];
    const body = document.getElementById(`memo-body-${catKey}`);
    const chevron = document.querySelector(`#city-memo-${catKey} .city-memo-chevron`);
    if (body) body.classList.toggle('open', !!appState.cityMemos[key]);
    if (chevron) chevron.classList.toggle('open', !!appState.cityMemos[key]);
}

function enterMemoEdit(catKey) {
    const body = document.getElementById(`memo-body-${catKey}`);
    if (!body) return;
    // 열려있지 않으면 먼저 열기
    if (!body.classList.contains('open')) toggleCityMemo(catKey);
    const current = (appState.cityMemos || {})[catKey] || '';
    body.innerHTML = `
        <textarea class="city-memo-textarea" id="memo-ta-${catKey}">${current.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
        <div class="city-memo-save-row">
            <button class="btn-memo-cancel" onclick="cancelMemoEdit('${catKey}')">취소</button>
            <button class="btn-memo-save" onclick="saveCityMemo('${catKey}')">저장</button>
        </div>`;
    const ta = document.getElementById(`memo-ta-${catKey}`);
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

function cancelMemoEdit(catKey) {
    // 편집 취소 → 다시 renderContent
    renderContent();
}

function saveCityMemo(catKey) {
    const ta = document.getElementById(`memo-ta-${catKey}`);
    if (!ta) return;
    if (!appState.cityMemos) appState.cityMemos = {};
    appState.cityMemos[catKey] = ta.value.trim();
    appState.cityMemos[`${catKey}__open`] = true;

    // 🔥 Firebase META_MEMOS 경로에 직접 쓰기 (master만)
    if (window._fb && _fbDataReady && currentUser) {
        const uc = USER_CONFIG[currentUser];
        if (uc.isMaster && uc.canWrite) {
            const { db, ref, set } = window._fb;
            const memosToSave = {};
            Object.entries(appState.cityMemos).forEach(([k, v]) => {
                if (!k.endsWith('__open')) memosToSave[k] = v;
            });
            set(ref(db, FB.META_MEMOS), memosToSave)
                .then(() => setSyncStatus('ok', '✅ 메모 저장 완료'))
                .catch(e => { console.error('[memos save]', e); setSyncStatus('error', '❌ 메모 저장 실패'); });
        }
    }

    renderContent(); updateProgress(); updateTrashFab();
}

function openTodayItinerary() {
    const { start, end } = getTripDates();
    const today = new Date(); today.setHours(0,0,0,0);
    start.setHours(0,0,0,0); end.setHours(0,0,0,0);

    // 여행 중이 아니면 아무것도 안 함
    if (today < start || today > end) return;

    // 오늘의 dk = 여행 시작일부터 몇 번째 날인지
    const todayDK = String(Math.floor((today - start) / 86400000) + 1);

    const td = appState.itinerary;
    const filteredCats = getFilteredCategories('itinerary');
    let targetCat = null;

    // 오늘 DK를 가진 도시 찾기
    for (const catKey of Object.keys(filteredCats)) {
        const tasks = getStructureArr(td.structure, catKey);
        const hasTodayDK = tasks.some(t => getDK(t) === todayDK);
        if (hasTodayDK) { targetCat = catKey; break; }
    }
    if (!targetCat) return;

    // 도시 + 날짜 아코디언 열기
    td.cityOpen[targetCat] = true;
    const dayKey = `${targetCat}__${todayDK}`;
    td.dayOpen[dayKey] = true;

    // 6) 유동 블록 도시(nice_b/swiss_b/london_b)이면 해당 블록도 열기
    const FLOAT_MAP = { nice:'nice_b', swiss:'swiss_b', london:'london_b' };
    const floatKey = FLOAT_MAP[targetCat];
    if (floatKey && filteredCats[floatKey]) {
        td.cityOpen[floatKey] = true;
        // 첫 번째 plan 자동 오픈
        const floatData = td.structure[floatKey];
        if (floatData && typeof floatData === 'object' && !Array.isArray(floatData)) {
            const firstPlan = Object.keys(floatData)[0];
            if (firstPlan) td.dayOpen[`${floatKey}__${firstPlan}`] = true;
        }
    }

    renderContent();

    // 해당 섹션으로 스크롤
    setTimeout(() => _doScrollToSection(targetCat), 200);
}

function updateTabUI() {
    const tab = appState.activeTab;
    loadWeather();  // 탭 전환시마다 날씨 갱신
    document.getElementById('theme-bar').style.backgroundColor = config[tab].theme;
    document.getElementById('view-title').textContent = config[tab].title;
    document.getElementById('progress-bar').style.backgroundColor = config[tab].theme;
    ['reservations','itinerary','packing','passes'].forEach(t =>
        document.getElementById(`tab-btn-${t}`).classList.toggle('tab-active', t === tab)
    );
    // 📱 하단 탭 바 활성 상태
    document.querySelectorAll('.btab').forEach(btn => {
        btn.classList.toggle('btab-active', btn.dataset.tab === tab);
    });
    // 🎫 패스 탭: 편집/추가 FAB 숨김 (읽기 전용)
    const fabEdit = document.getElementById('fab-edit');
    if (fabEdit) fabEdit.style.display = (tab === 'passes') ? 'none' : '';
    const fabAdd = document.getElementById('fab-add');
    if (fabAdd) fabAdd.style.display = (tab === 'passes') ? 'none' : '';
    // D-day (모든 탭)
    const {start,end} = getTripDates();
    const today = new Date(); today.setHours(0,0,0,0);
    start.setHours(0,0,0,0); end.setHours(0,0,0,0);
    const wd = ['일','월','화','수','목','금','토'];
    document.getElementById('today-badge').textContent =
        `📅 ${today.getMonth()+1}월 ${today.getDate()}일(${wd[today.getDay()]})`;
    const tb = document.getElementById('trip-badge');
    if (today < start) {
        const d = Math.ceil((start - today) / 86400000);
        tb.className = 'trip-badge trip-before'; tb.textContent = `✈️ 출발까지 D-${d}`;
    } else if (today <= end) {
        const d = Math.ceil((today - start) / 86400000) + 1;
        tb.className = 'trip-badge trip-ongoing'; tb.textContent = `🌍 여행 ${d}일차 진행 중!`;
    } else {
        tb.className = 'trip-badge trip-after'; tb.textContent = '🎉 여행 완료!';
    }
}

// ── DAY KEY ───────────────────────────────────────────────
function getDK(task) {
    const raw = task._dk !== undefined ? task._dk : getDKfromId(task.id);
    // plan_a → __plan_a__ 정규화
    if (typeof raw === 'string' && /^plan_[a-e]$/.test(raw)) return `__${raw}__`;
    return raw;
}
function getDKfromId(id) {
    if (/-m$/.test(id)) return '__memo__';
    // nice_b-plan_a-0, swiss_b-__plan_b__-2 형식
    const pm2 = id.match(/[_-](?:__)?plan_([a-e])(?:__)?[-_]/i); if (pm2) return `__plan_${pm2[1].toLowerCase()}__`;
    const pm = id.match(/-p([a-e])\d*(?:-|$)/); if (pm) return `__plan_${pm[1]}__`;
    const dm = id.match(/-(\d+)[a-z]/); if (dm) return dm[1];
    return '__etc__';
}
const DK_LABEL = {
    '__memo__': '📌 숙소 & 교통 핵심 메모',
    '__etc__': '📝 기타',
    '이동': '🚆 이동일',
    '귀국': '✈️ 귀국일',
};
const DK_LABEL_BY_CAT = {
    swiss_b: {
        '__plan_a__': '☀️ Plan A — 융프라우 / 피르스트 (맑음)',
        '__plan_b__': '⛅ Plan B — 체르마트 / 마테호른 (흐림)',
        '__plan_c__': '☁️ Plan C — 칸더슈테크 / 외쉬넨 (비/회복)',
    },
    nice_b: {
        '__plan_a__': '🚢 Plan A — 모나코 당일치기',
        '__plan_b__': '🌊 Plan B — 느긋하게 니스 시내',
    },
    london_b: {
        '__plan_a__': '🎸 Plan A — 해로 스쿨 · 에비 로드 · 프림로즈 힐',
        '__plan_b__': '🎭 Plan B — 내셔널 갤러리 · 소호 · 웨스트엔드 뮤지컬',
        '__plan_c__': '🏛️ Plan C — 세인트폴 · 테이트 모던 · 버로우 마켓 · 템즈 야경',
        '__plan_d__': '🦕 Plan D — 벨그레이비어 · 자연사 박물관 · 사우스뱅크',
        '__plan_e__': '🍻 Plan E — 친구가 이끄는 비밀 명소',
    },
};
function getDKLabel(dk, tasks, catKey) {
    let label = '';
    if (DK_LABEL[dk]) label = DK_LABEL[dk];
    else if (catKey && DK_LABEL_BY_CAT[catKey]?.[dk]) label = DK_LABEL_BY_CAT[catKey][dk];
    else if (dk && dk.startsWith('__plan_')) {
        const letter = dk.replace('__plan_','').replace('__','').toUpperCase();
        label = `📋 Plan ${letter}`;
    } else {
        label = `📅 ${dk}일차`;
    }

    // 실제 날짜 계산: 도시 시작일(최소 _date) + (dk - 1)일
    const dkNum = parseInt(dk, 10);
    if (!isNaN(dkNum) && tasks && tasks.length > 0) {
        let minDate = null;
        for (const t of tasks) {
            if (t._date) {
                const d = new Date(t._date);
                if (!isNaN(d.getTime())) {
                    d.setHours(0,0,0,0);
                    if (!minDate || d < minDate) minDate = d;
                }
            }
        }
        if (minDate) {
            const actual = new Date(minDate);
            actual.setDate(actual.getDate() + dkNum - 1);
            const wd = ['일','월','화','수','목','금','토'];
            label += ` · ${actual.getMonth()+1}/${actual.getDate()}(${wd[actual.getDay()]})`;
        }
    }
    return label;
}

// ── DRAG AND DROP ─────────────────────────────────────────
let _dragId = null, _dragCat = null, _multiDrag = false;

function onDragStart(e) {
    if (!editMode) { e.preventDefault(); return; }
    const tid = this.dataset.tid;
    _dragCat = this.dataset.cat;

    // 드래그하는 item이 선택 목록에 있으면 → 다중 드래그
    if (selectedIds.size > 0 && selectedIds.has(tid)) {
        _multiDrag = true;
        _dragId = tid;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', '__multi__');
        // 유령 레이어 표시
        const ghost = document.getElementById('drag-ghost');
        ghost.textContent = `${selectedIds.size}개 항목 이동 중`;
        ghost.style.display = 'block';
        ghost.style.left = (e.clientX + 14) + 'px';
        ghost.style.top  = (e.clientY - 18) + 'px';
    } else {
        _multiDrag = false;
        _dragId = tid;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', tid);
    }
    this.classList.add('dragging');
    setTimeout(() => document.querySelectorAll('.drop-zone').forEach(z => z.style.pointerEvents = 'auto'), 0);
}

function onDragEnd() {
    this.classList.remove('dragging');
    const ghost = document.getElementById('drag-ghost');
    if (ghost) ghost.style.display = 'none';
    document.querySelectorAll('.drop-zone').forEach(z => { z.classList.remove('over'); z.style.pointerEvents = 'none'; });
    _dragId = _dragCat = null; _multiDrag = false;
}

// 유령이 마우스 따라다니기
document.addEventListener('dragover', e => {
    const ghost = document.getElementById('drag-ghost');
    if (ghost && ghost.style.display !== 'none') {
        ghost.style.left = (e.clientX + 14) + 'px';
        ghost.style.top  = (e.clientY - 18) + 'px';
    }
});

function makeDropZone(targetCat, targetDK, insertBeforeId) {
    const z = document.createElement('div');
    z.className = 'drop-zone';
    z.style.pointerEvents = 'none';
    z.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); z.classList.add('over'); });
    z.addEventListener('dragleave', () => z.classList.remove('over'));
    z.addEventListener('drop', e => { e.preventDefault(); e.stopPropagation(); z.classList.remove('over'); doDropTo(targetCat, targetDK, insertBeforeId); });
    return z;
}

function doDropTo(targetCat, targetDK, insertBeforeId) {
    if (!_dragId) return;
    const td = appState[appState.activeTab];

    // 이동 대상 ID 목록
    const idsToMove = (_multiDrag && selectedIds.size > 0) ? [...selectedIds] : [_dragId];

    // 배열 순서를 유지하면서 수집
    const movedTasks = [];
    Object.keys(td.structure).forEach(k => {
        const val = td.structure[k];
        if (Array.isArray(val)) {
            // 일반 배열
            const keep = [], moved = [];
            val.forEach(t => { if (idsToMove.includes(t.id)) moved.push(t); else keep.push(t); });
            td.structure[k] = keep;
            movedTasks.push(...moved);
        } else if (val && typeof val === 'object') {
            // 유동 블록: 각 plan 배열에서 찾아 제거
            Object.keys(val).forEach(planKey => {
                if (!Array.isArray(val[planKey])) return;
                const keep = [], moved = [];
                val[planKey].forEach(t => { if (idsToMove.includes(t.id)) moved.push(t); else keep.push(t); });
                val[planKey] = keep;
                movedTasks.push(...moved);
            });
        }
    });
    if (!movedTasks.length) return;

    // itinerary: 대상 dayKey 지정
    if (appState.activeTab === 'itinerary' && targetDK !== undefined) {
        movedTasks.forEach(t => { t._dk = targetDK; });
    }

    if (!td.structure[targetCat]) td.structure[targetCat] = [];
    const arr = td.structure[targetCat];
    if (insertBeforeId) {
        const ti = arr.findIndex(t => t.id === insertBeforeId);
        if (ti !== -1) arr.splice(ti, 0, ...movedTasks);
        else arr.push(...movedTasks);
    } else {
        arr.push(...movedTasks);
    }

    // 다중 드래그 완료 후 선택 해제
    if (_multiDrag) { selectedIds.clear(); updateEditBar(); }
    _dragId = _dragCat = null; _multiDrag = false;
    saveAndRender();
}

// ── RENDER ITEM ───────────────────────────────────────────
function renderItem(task, catKey, catInfo, td, dk) {
    const done   = !!td.checks[task.id];
    const ticket = td.tickets[task.id];
    const li = document.createElement('li');
    li.className = `task-item${done ? ' completed' : ''}`;
    li.style.borderLeftColor = catInfo.color;
    li.id = `item-${task.id}`;
    li.dataset.tid = task.id;
    li.dataset.cat = catKey;
    if (dk !== undefined) li.dataset.dk = dk;
    li.draggable = editMode;  // 편집모드 상태에 따라

    // 현재 진행 중인 항목 강조 (여행 중 + 오늘 + 시간 있는 경우)
    let isNow = false;
    if (task._time && dk !== undefined) {
        const { start, end } = getTripDates();
        const today = new Date(); today.setHours(0,0,0,0);
        const startC = new Date(start); startC.setHours(0,0,0,0);
        const endC   = new Date(end);   endC.setHours(0,0,0,0);
        if (today >= startC && today <= endC) {
            const todayDK = String(Math.floor((today - startC) / 86400000) + 1);
            if (String(dk) === todayDK) {
                const now = new Date();
                const [h, m] = task._time.split(':').map(Number);
                const taskMin = h * 60 + m;
                const nowMin  = now.getHours() * 60 + now.getMinutes();
                isNow = nowMin >= taskMin && nowMin < taskMin + 90;
            }
        }
    }
    if (isNow) li.classList.add('is-now');

    const isMemoTask = dk === '__memo__';
    if (isMemoTask) {
        li.classList.add('memo-task');
        li.style.cursor = 'default';
    }

    const timeBadge = task._time
        ? `<span class="task-time-badge${isNow ? ' now' : ''}" onclick="event.stopPropagation();showTimeInput('${task.id}','${catKey}')">${isNow ? '🔴 지금' : task._time}</span>`
        : (dk !== undefined && !isMemoTask ? `<button type="button" class="btn-add-time" onclick="event.stopPropagation();showTimeInput('${task.id}','${catKey}')">+ 시간</button>` : '');

    const isIt = appState.activeTab === 'itinerary';
    const isRP = appState.activeTab === 'reservations' || appState.activeTab === 'packing';
    const itemBadge = isRP ? _getItemBadge(task, catKey) : '';
    const hasWarn = (task.tips || '').includes('⚠️');

    // ── 팁: 둥근 박스 + 왼쪽 컬러바
    let tipsHtml = '';
    if (task.tips) {
        const safeT = _safeText(task.tips);
        const lines = safeT.split('\n').filter(l => l.trim());
        const barColor = hasWarn ? '' : `border-left-color:${catInfo.color}88`;
        if (lines.length > 1) {
            tipsHtml = `<div class="task-tips${hasWarn ? ' has-warn' : ''}" style="${barColor}">${lines.map(l=>`<div>${l}</div>`).join('')}</div>`;
        } else {
            const startsWithEmoji = /^[\p{Emoji_Presentation}\p{Extended_Pictographic}]/u.test(safeT.trim());
            const prefix = startsWithEmoji ? '' : '💡 ';
            tipsHtml = `<div class="task-tips${hasWarn ? ' has-warn' : ''}" style="${barColor}">${prefix}${safeT}</div>`;
        }
    }

    const chkSvg = `<svg viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1"/></svg>`;

    li.innerHTML = `
        <span class="drag-handle">⠿</span>
        ${isMemoTask ? '' : `<div class="check-circle">${chkSvg}</div>`}
        <div class="task-body">
            <div class="task-top">
                <div class="task-top-row">
                    ${timeBadge}
                    ${itemBadge}
                    <span class="task-title">${_safeText(task.title)}</span>
                    ${isIt ? getTransportBadge(task) : ''}
                </div>
                <button type="button" class="btn-edit-item" onclick="event.stopPropagation();enterEdit('${task.id}','${catKey}')">✏️</button>
            </div>
            ${task.desc ? `<p class="task-desc">${_safeText(task.desc)}</p>` : ''}
            ${tipsHtml}
            ${isMemoTask ? '' : `<div class="task-meta-row">
                <label for="up-${task.id}" class="btn-attach-label" onclick="event.stopPropagation()">📎 첨부</label>
                <input type="file" id="up-${task.id}" style="display:none" accept="image/*,application/pdf,.pdf" onchange="handleUpload(this,'${task.id}')">
                ${ticket ? `<div class="ticket-badge"><span class="ticket-name">📄 ${_escHtml(ticket.name)}</span><button type="button" class="btn-ticket-view" onclick="event.stopPropagation();viewTicket('${task.id}')">보기</button><button type="button" class="btn-ticket-del" onclick="event.stopPropagation();delTicket('${task.id}')">✕</button></div>` : ''}
            </div>`}
        </div>`;

    // 지도 버튼: task-body 밖 li에 직접 추가 (pointer-events:none 상속 우회)
    if (appState.activeTab === 'itinerary' && shouldShowMap(task.title, task.id)) {
        const mapBtn = document.createElement('button');
        mapBtn.type = 'button';
        mapBtn.className = 'btn-map';
        const coord = PLACE_COORDS[task.id];
        mapBtn.textContent = coord ? '📍 지도' : '🗺 지도';
        const mapUrl = getMapUrl(task.id, task.title);
        mapBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            e.preventDefault();
            window.open(mapUrl, '_blank');
            return false;
        });
        li.appendChild(mapBtn);
    }

    li.addEventListener('click', e => {
        if (e.target.closest('button,label,input,a,textarea,select,.edit-form')) return;
        if (li.querySelector('.edit-form')) return;
        if (editMode) { toggleSelect(task.id); return; }
        if (isMemoTask) return;
        toggleCheck(task.id);
    });
    li.addEventListener('dragstart', onDragStart);
    li.addEventListener('dragend',   onDragEnd);
    return li;
}

function _getPassChecks() {
    return appState.passChecks || {};
}

function renderPassTab(container) {
    const passData = appState.passes || {};
    const cats = config.passes.categories;
    const checks = _getPassChecks();

    const CAT_COLORS = {
        '교통':    { bg:'#eff6ff', color:'#1d4ed8', border:'#bfdbfe', icon:'🚇' },
        '뮤지엄':  { bg:'#faf5ff', color:'#7c3aed', border:'#ddd6fe', icon:'🖼️' },
        '입장권':  { bg:'#fffbeb', color:'#b45309', border:'#fde68a', icon:'🎟️' },
        '액티비티':{ bg:'#f0fdf4', color:'#15803d', border:'#bbf7d0', icon:'🏔️' },
        '기타':    { bg:'#f8fafc', color:'#475569', border:'#e2e8f0', icon:'📎' },
    };

    for (const [cityKey, catInfo] of Object.entries(cats)) {
        const items = passData[cityKey];
        if (!items || !items.length) continue;

        const section = document.createElement('section');
        section.id = `section-${cityKey}`;
        section.className = 'cat-section';

        // 도시별 체크 진행률
        const done = items.filter(it => checks[it.id]).length;
        const total = items.length;

        // 카테고리 칩 요약
        const catTypes = [...new Set(items.map(it => it.category))];
        const chipsHtml = catTypes.map(ct => {
            const cc = CAT_COLORS[ct] || CAT_COLORS['기타'];
            const cnt = items.filter(it => it.category === ct).length;
            return `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;background:${cc.bg};color:${cc.color};border:1px solid ${cc.border}">${cc.icon} ${ct} ${cnt}</span>`;
        }).join('');

        // 도시 헤더 (아코디언)
        const isOpen = appState.passes._cityOpen?.[cityKey] !== false; // 기본 열림
        section.innerHTML = `
            <button type="button" onclick="togglePassCity('${cityKey}')" class="city-card" style="border-left-color:${catInfo.color}">
                <div class="city-card-left">
                    <span class="city-card-title">${catInfo.title}</span>
                    <span class="city-count-badge" style="background:${catInfo.color}">${done}/${total}</span>
                    <div style="display:flex;gap:3px;flex-wrap:wrap;margin-left:6px">${chipsHtml}</div>
                </div>
                <span class="city-chevron${isOpen ? ' open' : ''}">▼</span>
            </button>
            <div class="accordion-body${isOpen ? ' open' : ''}" id="pass-body-${cityKey}">
                <div style="padding:4px 0 8px" id="pass-inner-${cityKey}"></div>
            </div>`;
        container.appendChild(section);

        if (!isOpen) continue;

        const inner = section.querySelector(`#pass-inner-${cityKey}`);

        for (const item of items) {
            const isChecked = checks[item.id] || false;
            const cc = CAT_COLORS[item.category] || CAT_COLORS['기타'];
            const hasWarn = (item.coverage || '').includes('⚠️');

            const card = document.createElement('div');
            card.className = `task-item${isChecked ? ' completed' : ''}`;
            card.id = `item-${item.id}`;
            card.style.borderLeftColor = cc.color;

            let cardHtml = `
                <div class="check-circle"><svg viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1"/></svg></div>
                <div class="task-body">
                    <div class="task-top-row">
                        <span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;background:${cc.bg};color:${cc.color}">${cc.icon} ${item.category}</span>
                        <span class="task-title">${item.title}</span>
                    </div>`;

            // 비용
            if (item.cost) {
                cardHtml += `<div style="font-size:12px;font-weight:800;color:#2563eb;margin-top:3px">${item.cost}</div>`;
            }

            // 구매 방법
            if (item.howToBuy) {
                cardHtml += `<p class="task-desc">📱 ${item.howToBuy.replace(/\n/g, ' · ')}</p>`;
            }

            // 커버 범위
            if (item.coverage) {
                const barStyle = hasWarn ? '' : `border-left-color:${cc.color}88`;
                cardHtml += `<div class="task-tips${hasWarn ? ' has-warn' : ''}" style="${barStyle}">${item.coverage}</div>`;
            }

            // 팁
            if (item.tips) {
                const barStyle = `border-left-color:${cc.color}88`;
                cardHtml += `<div class="task-tips" style="${barStyle}">💡 ${item.tips.replace(/\n/g, ' · ')}</div>`;
            }

            cardHtml += `</div>`;
            card.innerHTML = cardHtml;
            card.addEventListener('click', () => toggleCheck(item.id));
            inner.appendChild(card);
        }
    }

    // 데이터 없을 때
    if (!container.children.length) {
        container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
            <div style="font-size:32px;margin-bottom:12px">🎫</div>
            <div style="font-size:13px;font-weight:600">패스 데이터를 불러오는 중...</div>
            <div style="font-size:11px;margin-top:6px">Firebase에 passTickets가 동기화되면 여기에 표시돼요</div>
        </div>`;
    }
}

function togglePassCity(cityKey) {
    if (!appState.passes._cityOpen) appState.passes._cityOpen = {};
    const cur = appState.passes._cityOpen[cityKey];
    appState.passes._cityOpen[cityKey] = cur === false ? true : false;
    renderContent();
}

// 일정 탭 기차 이동 항목에 티켓 상태 뱃지 표시
const _TRANSPORT_KEYWORDS = /출발|탑승|RJX|EC\s|ICE|ECE|TGV|Eurostar|유로스타|기차|열차|Bayern/i;
const _CONFIRMED_TRAINS = ['RJX 60','EC 206','EC 58','ICE 1103','ECE 194','TGV 6170','TGV Inoui','Eurostar 9015','Eurostar 9036'];
const _PASS_TRAINS = ['Bayern', 'STP', 'Swiss Travel'];
const _UNBOOKED_ROUTES = ['Gotthard','Milano→Nice','Milano→Ventimiglia','밀라노행','Ventimiglia'];

function getTransportBadge(task) {
    const text = (task.title || '') + ' ' + (task.desc || '') + ' ' + (task.tips || '');
    if (!_TRANSPORT_KEYWORDS.test(text)) return '';
    // 확정 티켓 여부
    for (const t of _CONFIRMED_TRAINS) {
        if (text.includes(t)) return `<span style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:999px;background:rgba(37,99,235,0.12);color:#2563eb;border:1px solid rgba(37,99,235,0.2);white-space:nowrap;margin-left:4px;flex-shrink:0">🎫 확정</span>`;
    }
    // 패스 커버
    for (const p of _PASS_TRAINS) {
        if (text.includes(p)) return `<span style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:999px;background:rgba(22,163,74,0.12);color:#16a34a;border:1px solid rgba(22,163,74,0.2);white-space:nowrap;margin-left:4px;flex-shrink:0">🚇 패스</span>`;
    }
    // 미예매
    for (const u of _UNBOOKED_ROUTES) {
        if (text.includes(u)) return `<span style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:999px;background:rgba(234,88,12,0.12);color:#ea580c;border:1px solid rgba(234,88,12,0.2);white-space:nowrap;margin-left:4px;flex-shrink:0">⚠️ 미예매</span>`;
    }
    return '';
}

// 일정 탭 도시 헤더에 패스 요약 칩 (교통+뮤지엄만)
function getPassChipsHtml(cityKey) {
    const passData = appState.passes || {};
    const items = passData[cityKey];
    if (!items || !items.length) return '';
    const chips = items
        .filter(it => it.category === '교통' || it.category === '뮤지엄')
        .slice(0, 3)
        .map(it => {
            const isT = it.category === '교통';
            const bg = isT ? '#eff6ff' : '#faf5ff';

            const icon = isT ? '🚇' : '🖼️';
            const shortName = (it.title || '').split('\n')[0].replace(/\[.*?\]\s*/, '').slice(0, 12);
            return `<span style="font-size:8px;font-weight:600;padding:1px 5px;border-radius:999px;background:${bg};color:${color};white-space:nowrap">${icon} ${shortName}</span>`;

// 개별 항목용 타입 뱃지 (카드 안에 표시, DB의 task.itemType 사용)
function _getItemBadge(task, catKey) {
    if (!task.itemType) return '';
    const badge = _TYPE_BADGE_MAP[task.itemType];
    if (!badge) return '';
    return `<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px;background:${badge.bg};color:${badge.color}">${badge.icon} ${task.itemType}</span>`;

// 카테고리 헤더 요약 칩 (아코디언 헤더에 유형별 수 표시)
function getCatChipsHtml(tasks, catKey) {
    // task.itemType 기반으로 유형별 카운트
    const counts = {};
    for (const task of tasks) {
        if (task.itemType) {
            counts[task.itemType] = (counts[task.itemType] || 0) + 1;
        }
    }
    if (!Object.keys(counts).length) return '';
    return '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-left:6px">' +
        Object.entries(counts).map(([type, cnt]) => {
            const b = _TYPE_BADGE_MAP[type] || _TYPE_BADGE_MAP['기타'];
            return `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;background:${b.bg};color:${b.color};border:1px solid ${b.border}">${b.icon} ${type} ${cnt}</span>`;
        }).join('') + '</div>';
}

// ── RENDER CONTENT ────────────────────────────────────────
function renderContent() {
    const container = document.getElementById('list-container');
    container.innerHTML = '';

    // 🎫 패스 탭은 별도 렌더러
    if (appState.activeTab === 'passes') {
        renderPassTab(container);
        return;
    }

    const td  = appState[appState.activeTab];
    const cfg = config[appState.activeTab];
    const isIt = appState.activeTab === 'itinerary';



    Object.entries(getFilteredCategories(appState.activeTab)).forEach(([catKey, catInfo]) => {
        const uc = currentUser ? USER_CONFIG[currentUser] : null;
        // 유동 블록(swiss_b/nice_b/london_b): { __plan_a__:[...], ... } → 배열로 flatten
        const rawCatData = td.structure[catKey];
        let baseTasks;
        if (rawCatData && !Array.isArray(rawCatData) && typeof rawCatData === 'object') {
            // __plan_x__ 키만 사용 (숫자키·잡키 완전 무시)
            baseTasks = Object.entries(rawCatData)
                .filter(([k]) => k.startsWith('__plan_'))
                .flatMap(([, arr]) => Array.isArray(arr) ? arr : []);
        } else {
            baseTasks = rawCatData || [];
        }
        // 고정 일정 카드(swiss/nice/london)에 유동 블록 항목이 섞이지 않도록 필터
        const FIXED_CATS = ['swiss', 'nice', 'london'];
        if (FIXED_CATS.includes(catKey)) {
            baseTasks = baseTasks.filter(t => {
                const dk = getDK(t);
                return !dk || !dk.startsWith('__plan_');
            });
        }

        if (uc && uc.saveMode === 'private') {
            // cat/seo: 마스터 항목에 오버라이드 적용 + 본인 추가 항목 합치기
            const overrides = (appState[appState.activeTab]._overrides || {})[catKey] || {};
            if (Object.keys(overrides).length > 0) {
                baseTasks = baseTasks.map(task =>
                    overrides[task.id] ? { ...task, ...overrides[task.id] } : task
                );
            }
            const privateTasks = (td._private || {})[catKey] || [];
            baseTasks = [...baseTasks, ...privateTasks];
        } else if (uc && uc.saveMode === 'session') {
            // solo: 마스터 항목 + 세션 임시 항목 합치기
            const sessionTasks = (soloSessionStructure?.[appState.activeTab] || {})[catKey] || [];
            baseTasks = [...baseTasks, ...sessionTasks];
        }

        let tasks = getFilteredTasks(appState.activeTab, catKey, baseTasks);
        const section = document.createElement('section');
        section.id = `section-${catKey}`;
        section.className = 'cat-section';

        if (isIt) {
            const isOpen = !!(appState.itinerary.cityOpen[catKey]);
            const done   = tasks.filter(t => getDK(t) !== '__memo__' && td.checks[t.id]).length;
            const total  = tasks.filter(t => getDK(t) !== '__memo__').length;
            section.innerHTML = `
                <button type="button" onclick="toggleCity('${catKey}')" class="city-card" style="border-left-color:${catInfo.color}">
                    <div class="city-card-left">
                        <span class="city-card-title">${catInfo.title}</span>
                        <span class="city-count-badge" style="background:${catInfo.color}">${done}/${total}</span>
                        ${getPassChipsHtml(catKey)}
                    </div>
                    <span class="city-chevron${isOpen?' open':''}">▼</span>
                </button>
                <div class="accordion-body${isOpen?' open':''}" id="city-body-${catKey}">
                    <div style="padding:2px 4px 8px" id="city-inner-${catKey}"></div>
                </div>`;
            container.appendChild(section);
            if (!isOpen) return;

            const inner = section.querySelector(`#city-inner-${catKey}`);

            // ── 숙소 주소 칩 ──
            renderAccommodation(inner, catKey);
            // ── 도시 메모 블록 (일정 위, 기본 접힘) ──
            renderCityMemo(inner, catKey, catInfo);

            // tasks → day 그룹핑 + 오늘 타임라인 배너
            const { start, end } = getTripDates();
            const today = new Date(); today.setHours(0,0,0,0);
            const startC = new Date(start); startC.setHours(0,0,0,0);
            const endC   = new Date(end);   endC.setHours(0,0,0,0);
            const isToday = (dk) => {
                if (today < startC || today > endC) return false;
                const todayDK = String(Math.floor((today - startC) / 86400000) + 1);
                return String(dk) === todayDK;
            };

            const groups = {}, order = [];
            tasks.forEach(t => {
                const dk = getDK(t);
                if (dk === '__memo__') return; // 메모 그룹은 도시 메모 블록에서 표시
                if (!groups[dk]) { groups[dk] = []; order.push(dk); }
                groups[dk].push(t);
            });

            order.forEach(dk => {
                const gt      = groups[dk];
                const dayOpen = !!(appState.itinerary.dayOpen[`${catKey}__${dk}`]);
                const ddone   = gt.filter(t => td.checks[t.id]).length;
                const todayDay = isToday(dk);

                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-group';
                dayDiv.style.position = 'relative';
                // 빈 날짜로 드롭 지원
                dayDiv.addEventListener('dragover', e => e.preventDefault());
                dayDiv.addEventListener('drop', e => { e.stopPropagation(); if (_dragId) doDropTo(catKey, dk, null); });

                const hdr = document.createElement('button');
                hdr.type = 'button';
                hdr.className = `day-header${todayDay ? ' today-day' : ''}`;
                if (todayDay) hdr.style.cssText = 'background:linear-gradient(135deg,#fef9c3,#fef3c7);border-bottom:1px solid #fde68a';
                hdr.onclick = () => toggleDay(catKey, dk);

                // 이 날 좌표 데이터가 있는 항목 수 체크
                const hasCoordsCount = gt.filter(t => PLACE_COORDS[t.id]).length;

                hdr.innerHTML = `
                    <div class="day-header-left">
                        <span class="day-label">${getDKLabel(dk, tasks, catKey)}</span>
                        ${todayDay ? `<span class="day-count" style="background:#fde68a;color:#92400e">📍 오늘</span>` : ''}
                        ${ddone > 0
                            ? `<span class="day-count done">${ddone}/${gt.length} 완료</span>`
                            : `<span class="day-count pending">${gt.length}개</span>`}
                    </div>
                    <span class="day-chevron${dayOpen?' open':''}" id="dc-${catKey}-${dk}">▼</span>`;

                dayDiv.appendChild(hdr);

                // 🗺 동선 지도 버튼 — header 밖 dayDiv에 absolute 배치
                if (hasCoordsCount >= 2) {
                    const routeBtn = document.createElement('button');
                    routeBtn.type = 'button';
                    routeBtn.className = 'btn-day-map';
                    routeBtn.textContent = `🗺 동선 (${hasCoordsCount})`;
                    routeBtn.style.cssText = 'position:absolute;top:50%;right:36px;transform:translateY(-50%);z-index:2';
                    routeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        e.preventDefault();
                        openDayMap(catKey, dk);
                    });
                    dayDiv.appendChild(routeBtn);
                }

                const body = document.createElement('div');
                body.className = `day-accordion-body${dayOpen?' open':''}`;
                body.id = `day-body-${catKey}-${dk}`;

                const wrap = document.createElement('div');
                wrap.className = 'day-body-inner';

                // 오늘이면 타임라인 배너
                if (todayDay) {
                    const now = new Date();
                    const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                    const banner = document.createElement('div');
                    banner.className = 'timeline-today-banner';
                    banner.innerHTML = `📍 <strong>오늘 일정</strong> &nbsp;현재 시각 ${timeStr} · 빨간 뱃지가 진행 중인 항목이에요`;
                    wrap.appendChild(banner);
                }

                wrap.appendChild(makeDropZone(catKey, dk, gt[0]?.id));
                gt.forEach((task, ti) => {
                    wrap.appendChild(renderItem(task, catKey, catInfo, td, dk));
                    wrap.appendChild(makeDropZone(catKey, dk, gt[ti+1]?.id || null));
                });
                const addBtn = document.createElement('button');
                addBtn.type = 'button'; addBtn.className = 'btn-add-task'; addBtn.style.marginTop = '4px';
                addBtn.textContent = '+ 이 날 항목 추가';
                addBtn.onclick = () => addTask(catKey, dk);
                wrap.appendChild(addBtn);

                body.appendChild(wrap); dayDiv.appendChild(body);
                inner.appendChild(dayDiv);
            });

        } else {
            // 예약 / 짐싸기 — 아코디언 카드 스타일
            const isOpen = td.catOpen[catKey] !== false; // 기본 열림
            const done  = tasks.filter(t => td.checks[t.id]).length;
            const total = tasks.length;
            const chipsHtml = getCatChipsHtml(tasks, catKey);
            section.innerHTML = `
                <button type="button" onclick="toggleCat('${catKey}')" class="city-card" style="border-left-color:${catInfo.color}">
                    <div class="city-card-left">
                        <span class="city-card-title">${catInfo.title}</span>
                        <span class="city-count-badge" style="background:${catInfo.color}">${done}/${total}</span>
                        ${chipsHtml}
                    </div>
                    <span class="city-chevron${isOpen ? ' open' : ''}">▼</span>
                </button>
                <div class="accordion-body${isOpen ? ' open' : ''}" id="cat-body-${catKey}">
                    <div style="padding:2px 4px 8px" id="cat-inner-${catKey}">
                        <ul class="task-list" id="list-${catKey}"></ul>
                        <button type="button" class="btn-add-task" onclick="addTask('${catKey}')" style="margin-top:4px">+ 항목 추가</button>
                    </div>
                </div>`;
            container.appendChild(section);
            if (!isOpen) return; // 접혀있으면 내부 렌더 스킵
            const ul = section.querySelector('ul');
            ul.appendChild(makeDropZone(catKey, undefined, tasks[0]?.id));
            tasks.forEach((task, ti) => {
                ul.appendChild(renderItem(task, catKey, catInfo, td, undefined));
                ul.appendChild(makeDropZone(catKey, undefined, tasks[ti+1]?.id || null));
            });
        }
    });
}

// ── ACCORDION ─────────────────────────────────────────────
function toggleCity(catKey) {
    const now = !appState.itinerary.cityOpen[catKey];
    appState.itinerary.cityOpen[catKey] = now;
    save();
    if (now) renderContent();
    else {
        document.getElementById(`city-body-${catKey}`)?.classList.remove('open');
        document.querySelector(`#section-${catKey} .city-chevron`)?.classList.remove('open');
    }
}
function toggleCat(catKey) {
    const td = appState[appState.activeTab];
    if (!td.catOpen) td.catOpen = {};
    const now = td.catOpen[catKey] === false ? true : false;
    td.catOpen[catKey] = now;
    save();
    if (now) renderContent();
    else {
        document.getElementById(`cat-body-${catKey}`)?.classList.remove('open');
        document.querySelector(`#section-${catKey} .city-chevron`)?.classList.remove('open');
    }
}
function toggleDay(catKey, dk) {
    const sk = `${catKey}__${dk}`;
    const now = !appState.itinerary.dayOpen[sk];
    appState.itinerary.dayOpen[sk] = now;
    save();
    document.getElementById(`day-body-${catKey}-${dk}`)?.classList.toggle('open', now);
    document.getElementById(`dc-${catKey}-${dk}`)?.classList.toggle('open', now);
    updateProgress();
}

// ── CHECK ─────────────────────────────────────────────────
function toggleCheck(id) {
    if (appState.activeTab === 'passes') {
        appState.passChecks[id] = !appState.passChecks[id];
    } else {
        const td = appState[appState.activeTab];
        td.checks[id] = !td.checks[id];
    }
    document.getElementById(`item-${id}`)?.classList.toggle('completed', !!(appState.activeTab === 'passes' ? appState.passChecks[id] : appState[appState.activeTab].checks[id]));
    save(); updateProgress();
}

// ── EDIT ITEM (인라인) ────────────────────────────────────
function enterEdit(taskId, catKey) {
    const li = document.getElementById(`item-${taskId}`);
    if (!li) return;
    const td = appState[appState.activeTab];
    let task = null;
    for (const k in td.structure) { task = getStructureArr(td.structure, k).find(t => t.id === taskId); if (task) break; }
    // _private도 탐색 (cat/seo 추가 항목)
    if (!task && td._private) {
        for (const k in td._private) { task = (td._private[k] || []).find(t => t.id === taskId); if (task) break; }
    }
    if (!task) return;
    const cats  = config[appState.activeTab].categories;
    const color = cats[catKey]?.color || '#888';
    li.innerHTML = `<div class="edit-form">
        <input type="text" id="et-${taskId}" class="edit-input" value="${(task.title||'').replace(/"/g,'&quot;')}" placeholder="제목">
        <input type="text" id="ed-${taskId}" class="edit-input" value="${(task.desc||'').replace(/"/g,'&quot;')}" placeholder="날짜/교통 등">
        <input type="time" id="etm-${taskId}" class="edit-input" value="${task._time||''}" placeholder="시간 (예: 14:30)" style="color:var(--text-primary)">
        <textarea id="ep-${taskId}" class="edit-input edit-textarea" placeholder="팁 메모">${task.tips||''}</textarea>
        <select id="ec-${taskId}" class="edit-input edit-select">
            ${Object.entries(cats).map(([k,v]) => `<option value="${k}"${k===catKey?' selected':''}>${v.title}</option>`).join('')}
        </select>
        <div class="edit-actions">
            <button type="button" class="btn-del-item" onclick="startDelete('${taskId}')">🗑️ 삭제</button>
            <div class="edit-actions-right">
                <button type="button" class="btn-cancel-edit" onclick="renderContent()">취소</button>
                <button type="button" class="btn-save-edit" style="background:${color}" onclick="saveEdit('${taskId}','${catKey}')">저장</button>
            </div>
        </div>
    </div>`;
    li.style.cursor = 'default';
    // 편집 폼 내부 클릭이 li의 toggleCheck로 버블링되지 않도록 차단
    li.querySelector('.edit-form').addEventListener('click', e => e.stopPropagation());
    li.querySelector('.edit-form').addEventListener('mousedown', e => e.stopPropagation());
}
function saveEdit(taskId, oldCat) {
    const td = appState[appState.activeTab];
    const uc = currentUser ? USER_CONFIG[currentUser] : null;
    const title = document.getElementById(`et-${taskId}`)?.value || '';
    const desc  = document.getElementById(`ed-${taskId}`)?.value || '';
    const time  = document.getElementById(`etm-${taskId}`)?.value || '';
    const tips  = document.getElementById(`ep-${taskId}`)?.value || '';
    const newCat= document.getElementById(`ec-${taskId}`)?.value || oldCat;

    // structure와 _private 둘 다 탐색
    let _found = findTaskInStructure(td.structure, taskId);
    const isPrivate = !_found && td._private;
    if (!_found && td._private) _found = findTaskInStructure(td._private, taskId);
    if (!_found) return;

    const isMasterItem = !isPrivate; // 마스터(시트)에서 온 항목인지 여부

    if (uc && uc.saveMode === 'private' && isMasterItem) {
        // cat/seo가 마스터 항목 편집 → _overrides에 오버라이드로 저장 (마스터 불변)
        const tab = appState.activeTab;
        if (!appState[tab]._overrides) appState[tab]._overrides = {};
        if (!appState[tab]._overrides[newCat]) appState[tab]._overrides[newCat] = {};
        const override = {};
        override.title = title;
        override.desc  = desc;
        override.tips  = tips;
        if (time) override._time = time; else override._time = '';
        appState[tab]._overrides[newCat][taskId] = override;
    } else {
        // 마스터 계정이거나 _private 항목 편집 → 기존 방식
        if (oldCat === newCat) {
            // 같은 카테고리: 제자리에서 수정 (순서 유지)
            const task = _found.arr[_found.idx];
            task.title = title; task.desc = desc; task.tips = tips;
            if (time) task._time = time; else delete task._time;
        } else {
            // 카테고리 이동: 기존 위치에서 제거 → 새 카테고리 끝에 추가
            const [task] = _found.arr.splice(_found.idx, 1);
            task.title = title; task.desc = desc; task.tips = tips;
            if (time) task._time = time; else delete task._time;

            if (isPrivate) {
                if (!td._private[newCat]) td._private[newCat] = [];
                td._private[newCat].push(task);
            } else {
                if (!td.structure[newCat]) td.structure[newCat] = [];
                td.structure[newCat].push(task);
            }
        }
    }
    saveAndRender();
}

// ── DELETE → TRASH ────────────────────────────────────────
let _pendingDelId = null;
function startDelete(taskId) {
    _pendingDelId = taskId;
    const td = appState[appState.activeTab];
    let title = '';
    for (const k in td.structure) {
        const t = getStructureArr(td.structure, k).find(t => t.id===taskId);
        if (t) { title=t.title; break; }
    }
    if (!title && td._private) {
        for (const k in td._private) {
            const t = (td._private[k] || []).find(t => t.id===taskId);
            if (t) { title=t.title; break; }
        }
    }
    document.getElementById('dlg-delete-desc').textContent =
        `"${title.length>30?title.slice(0,30)+'…':title}" — 휴지통으로 이동합니다.`;
    openDlg('dlg-delete');
}
function confirmDeleteNow() {
    if (!_pendingDelId) return;
    const id = _pendingDelId; closeDlg('dlg-delete'); _pendingDelId = null;
    const tab = appState.activeTab, td = appState[tab];

    let found = findTaskInStructure(td.structure, id);
    let isPrivate = false;
    if (!found && td._private) {
        found = findTaskInStructure(td._private, id);
        isPrivate = true;
    }

    if (found) {
        const [task] = found.arr.splice(found.idx, 1);
        // fromPrivate: 복구 시 _private vs structure 구분용
        appState.trash.unshift({ ...task, fromTab:tab, fromCat:found.catKey, fromIdx:found.idx, deletedAt:Date.now(), fromPrivate:isPrivate });
        delete td.checks[id]; delete td.tickets[id];
    }
    saveAndRender(); updateTrashFab();
}

// ── ADD TASK ──────────────────────────────────────────────
function addTask(catKey, dk) {
    const tab = appState.activeTab;
    const td = appState[tab];
    const uc = currentUser ? USER_CONFIG[currentUser] : null;

    let newId;
    if (dk !== undefined && tab === 'itinerary') {
        const pre = catKey.slice(0,3);
        if (dk === '__memo__')            newId = `${pre}-mx-${Date.now()}`;
        else if (dk.startsWith('__plan_')){ const pl = dk.replace('__plan_','').replace('__',''); newId = `${pre}-p${pl}0-${Date.now()}`; }
        else if (dk === '__etc__')         newId = `${pre}-zx-${Date.now()}`;
        else                               newId = `${pre}-${dk}x-${Date.now()}`;
    } else {
        newId = 'tk-' + Date.now();
    }
    const task = { id:newId, title:'새로운 항목', desc:'', tips:'' };
    if (dk !== undefined && tab === 'itinerary') task._dk = dk;

    // saveMode에 따라 저장 위치 분기
    if (uc && uc.saveMode === 'session') {
        // solo: 세션 메모리에만 추가
        if (!soloSessionStructure) soloSessionStructure = { reservations:{}, itinerary:{}, packing:{} };
        const s = soloSessionStructure[tab];
        if (!s[catKey]) s[catKey] = [];
        if (dk !== undefined && tab === 'itinerary') {
            let lastIdx = -1;
            s[catKey].forEach((t, i) => { if (getDK(t) === dk) lastIdx = i; });
            if (lastIdx !== -1) s[catKey].splice(lastIdx + 1, 0, task); else s[catKey].push(task);
            appState.itinerary.dayOpen[`${catKey}__${dk}`] = true;
        } else {
            s[catKey].push(task);
        }
    } else if (uc && uc.saveMode === 'private') {
        // cat/seo: 개인 _private에 추가
        if (!td._private) td._private = {};
        if (!td._private[catKey]) td._private[catKey] = [];
        if (dk !== undefined && tab === 'itinerary') {
            let lastIdx = -1;
            td._private[catKey].forEach((t, i) => { if (getDK(t) === dk) lastIdx = i; });
            if (lastIdx !== -1) td._private[catKey].splice(lastIdx + 1, 0, task); else td._private[catKey].push(task);
            appState.itinerary.dayOpen[`${catKey}__${dk}`] = true;
        } else {
            td._private[catKey].push(task);
        }
    } else {
        // 마스터: 기존 structure에 추가
        const catVal = td.structure[catKey];
        const isFloat = catVal && !Array.isArray(catVal) && typeof catVal === 'object';

        if (isFloat && dk !== undefined) {
            // 유동 블록 (swiss_b/nice_b/london_b) + plan dk
            if (!catVal[dk]) catVal[dk] = [];
            const planArr = catVal[dk];
            planArr.push(task);
            appState.itinerary.dayOpen[`${catKey}__${dk}`] = true;
        } else if (!isFloat && dk !== undefined && tab === 'itinerary') {
            // 일반 도시 + 날짜 dk
            if (!td.structure[catKey]) td.structure[catKey] = [];
            const arr = td.structure[catKey];
            let lastIdx = -1;
            arr.forEach((t, i) => { if (getDK(t) === dk) lastIdx = i; });
            if (lastIdx !== -1) arr.splice(lastIdx + 1, 0, task); else arr.push(task);
            appState.itinerary.dayOpen[`${catKey}__${dk}`] = true;
        } else {
            if (!td.structure[catKey]) td.structure[catKey] = [];
            td.structure[catKey].push(task);
        }
    }

    saveAndRender();
    setTimeout(() => enterEdit(newId, catKey), 60);
}

// ── PROGRESS ──────────────────────────────────────────────
function updateProgress() {
    // 🎫 패스 탭 별도 처리
    if (appState.activeTab === 'passes') {
        const passData = appState.passes || {};
        const checks = _getPassChecks();
        let total = 0, done = 0;
        for (const items of Object.values(passData)) {
            if (!Array.isArray(items)) continue;
            total += items.length;
            items.forEach(it => { if (checks[it.id]) done++; });
        }
        const pct = total > 0 ? Math.round(done / total * 100) : 0;
        document.getElementById('progress-bar').style.width  = pct + '%';
        document.getElementById('progress-pct').textContent  = pct + '%';
        return;
    }
    const td  = appState[appState.activeTab];
    const filteredCats = getFilteredCategories(appState.activeTab);
    const all = Object.entries(td.structure)
        .filter(([k]) => filteredCats[k])
        .flatMap(([k]) => getFilteredTasks(appState.activeTab, k, getStructureArr(td.structure, k)))
        .filter(t => getDK(t) !== '__memo__');
    const n   = all.filter(t => td.checks[t.id]).length;
    const pct = all.length > 0 ? Math.round(n / all.length * 100) : 0;
    document.getElementById('progress-bar').style.width  = pct + '%';
    document.getElementById('progress-pct').textContent  = pct + '%';
}

// ── SCROLL SPY ────────────────────────────────────────────
function handleScroll() {
    const filteredCats = getFilteredCategories(appState.activeTab);
    let ak = '';
    for (const k in filteredCats) {
        const el = document.getElementById(`section-${k}`);
        if (el && el.getBoundingClientRect().top <= 180) ak = k;
    }
    // 데스크탑 사이드바
    document.querySelectorAll('.sidebar-item').forEach(it => {
        const m = it.id === `nav-${ak}`;
        it.classList.toggle('active', m);
        if (m && ak) {
            const c = filteredCats[ak].color;
            it.style.borderLeftColor = c; it.style.color = c;
            document.getElementById('indicator-dot').style.backgroundColor = c;
            document.getElementById('indicator-text').textContent = filteredCats[ak].title;
        } else { it.style.borderLeftColor='transparent'; it.style.color=''; }
    });
    // 모바일 하단 네비 active 동기화
    document.querySelectorAll('.mobile-sec-btn').forEach(btn => {
        const active = btn.dataset.cat === ak;
        btn.classList.toggle('active', active);
        if (active) {
            btn.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
        }
    });
}

// ── 모바일 하단 섹션 네비 렌더 ─────────────────────────────
function renderMobileNav() {
    const nav = document.getElementById('mobile-section-nav');
    if (!nav) return;
    const isMobile = window.innerWidth <= 1024;
    nav.style.display = isMobile ? 'flex' : 'none';
    if (!isMobile) return;

    const filteredCats = getFilteredCategories(appState.activeTab);
    nav.innerHTML = Object.entries(filteredCats).map(([k, cat]) =>
        `<button class="mobile-sec-btn" data-cat="${k}" onclick="scrollToSection('${k}')">
           <span class="mobile-sec-dot" style="background:${cat.color}"></span>
           ${cat.title}
         </button>`
    ).join('');
}

function scrollToSection(catKey) {
    const tab = appState.activeTab;

    // 이터너리: 해당 도시 아코디언 열기 (닫혀 있으면)
    if (tab === 'itinerary') {
        if (!appState.itinerary.cityOpen[catKey]) {
            appState.itinerary.cityOpen[catKey] = true;
            save();
            renderContent();
            setTimeout(() => _doScrollToSection(catKey), 60);
            return;
        }
    }
    _doScrollToSection(catKey);
}

function _doScrollToSection(catKey) {
    const el = document.getElementById(`section-${catKey}`);
    if (!el) return;
    const offset = 64;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top, behavior: 'smooth' });
}

// ── 모바일 Tips 토글 ──────────────────────────────────────
window.addEventListener('resize', () => {
    renderMobileNav();
});

// ── FILE / TICKET (Base64 방식 — Firebase Storage 불필요) ──
function handleUpload(input, taskId) {
    const f = input.files[0]; if (!f) return;
    const maxMB = 5;
    if (f.size > maxMB * 1024 * 1024) {
        alert(`파일이 너무 커요! ${maxMB}MB 이하 파일만 첨부 가능합니다.\n(바우처·티켓 사진은 보통 1~3MB 이하예요)`);
        return;
    }
    // 업로드 진행 표시
    _showUploadProgress(taskId, 0);
    const r = new FileReader();
    r.onprogress = (e) => {
        if (e.lengthComputable) {
            _showUploadProgress(taskId, Math.round(e.loaded / e.total * 90));
        }
    };
    r.onload = (e) => {
        appState[appState.activeTab].tickets[taskId] = {
            name: f.name,
            data: e.target.result,
            type: f.type
        };
        _hideUploadProgress(taskId);
        saveAndRender();
    };
    r.onerror = () => {
        _hideUploadProgress(taskId);
        alert('파일 읽기 실패. 다시 시도해주세요.');
    };
    r.readAsDataURL(f);
}

function _showUploadProgress(taskId, pct) {
    let el = document.getElementById(`upload-prog-${taskId}`);
    if (!el) {
        el = document.createElement('div');
        el.id = `upload-prog-${taskId}`;
        el.style.cssText = 'position:fixed;bottom:90px;right:20px;z-index:9999;background:#1a1a18;color:#fff;border-radius:12px;padding:12px 18px;font-size:12px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.3);min-width:200px';
        document.body.appendChild(el);
    }
    el.innerHTML = `📎 파일 처리 중… ${pct}%<div style="margin-top:6px;height:4px;background:rgba(255,255,255,.2);border-radius:2px"><div style="height:100%;background:#22c55e;border-radius:2px;transition:width .3s;width:${pct}%"></div></div>`;
}
function _hideUploadProgress(taskId) {
    document.getElementById(`upload-prog-${taskId}`)?.remove();
}

function viewTicket(id) {
    const t = appState[appState.activeTab].tickets[id];
    if (!t) return;
    // PDF는 새 탭에서 열기
    if (t.type && t.type.includes('pdf')) {
        const w = window.open();
        w.document.write(`<iframe src="${t.data}" style="width:100%;height:100vh;border:none"></iframe>`);
        return;
    }
    document.getElementById('modal-img').src = t.data;
    document.getElementById('modal').style.display = 'flex';
}

function delTicket(id) {
    delete appState[appState.activeTab].tickets[id];
    saveAndRender();
}

// ── TRASH ─────────────────────────────────────────────────
let trashSelectActive = false;
let trashSelectedIdxs = new Set();

function updateTrashFab() {
    const n = appState.trash.length;
    const b = document.getElementById('fab-trash-badge');
    b.style.display = n > 0 ? 'flex' : 'none';
    b.textContent   = n > 9 ? '9+' : n;
    if (document.getElementById('trash-drawer').classList.contains('open')) renderTrashDrawer();
}

function openTrash() {
    trashSelectActive = false; trashSelectedIdxs.clear();
    renderTrashDrawer();
    document.getElementById('trash-overlay').classList.add('open');
    document.getElementById('trash-drawer').classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeTrash() {
    document.getElementById('trash-overlay').classList.remove('open');
    document.getElementById('trash-drawer').classList.remove('open');
    document.body.style.overflow = '';
    trashSelectActive = false; trashSelectedIdxs.clear();
}

function toggleTrashSelectMode() {
    trashSelectActive = !trashSelectActive;
    trashSelectedIdxs.clear();
    document.getElementById('trash-select-bar').classList.toggle('visible', trashSelectActive);
    document.getElementById('btn-trash-select-toggle').textContent = trashSelectActive ? '취소' : '선택';
    renderTrashDrawer();
}

function toggleTrashSelect(idx) {
    if (trashSelectedIdxs.has(idx)) trashSelectedIdxs.delete(idx);
    else trashSelectedIdxs.add(idx);
    const n = trashSelectedIdxs.size;
    document.getElementById('trash-select-label').textContent = n > 0 ? `${n}개 선택됨` : '항목을 선택하세요';
    document.getElementById('btn-trash-sel-del').disabled = n === 0;
    // 해당 행 시각 업데이트
    document.querySelectorAll('.trash-item[data-idx]').forEach(el => {
        const i = parseInt(el.dataset.idx);
        const sel = trashSelectedIdxs.has(i);
        el.classList.toggle('trash-selected', sel);
        const chk = el.querySelector('.trash-check'); if (chk) chk.textContent = sel ? '✓' : '';
    });
}

function selectAllTrash() {
    appState.trash.forEach((_, i) => trashSelectedIdxs.add(i));
    const n = trashSelectedIdxs.size;
    document.getElementById('trash-select-label').textContent = `${n}개 선택됨`;
    document.getElementById('btn-trash-sel-del').disabled = false;
    renderTrashDrawer();
}

function bulkTrashDelete() {
    if (!trashSelectedIdxs.size) return;
    const sorted = [...trashSelectedIdxs].sort((a, b) => b - a);
    sorted.forEach(i => appState.trash.splice(i, 1));
    trashSelectedIdxs.clear();
    document.getElementById('trash-select-label').textContent = '항목을 선택하세요';
    document.getElementById('btn-trash-sel-del').disabled = true;
    save(); updateTrashFab();
}

// alias - v28 코드 호환
function bulkDeleteTrash() { bulkTrashDelete(); }

function renderTrashDrawer() {
    document.getElementById('trash-pill').textContent = appState.trash.length;
    document.getElementById('trash-select-bar').classList.toggle('visible', trashSelectActive);
    document.getElementById('btn-trash-select-toggle').textContent = trashSelectActive ? '취소' : '선택';

    const body = document.getElementById('trash-body');
    if (!appState.trash.length) {
        body.innerHTML = `<div class="trash-empty-state"><div class="trash-empty-icon">🗑️</div>휴지통이 비어있어요</div>`;
        trashSelectActive = false;
        document.getElementById('trash-select-bar').classList.remove('visible');
        return;
    }

    body.innerHTML = '';

    // 선택 모드일 때 전체 선택 버튼
    if (trashSelectActive) {
        const selAllRow = document.createElement('div');
        selAllRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:4px 2px 10px;border-bottom:1px solid var(--border-light);margin-bottom:8px';
        const allChecked = trashSelectedIdxs.size === appState.trash.length;
        selAllRow.innerHTML = `
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;font-weight:700;color:var(--text-secondary)">
                <input type="checkbox" onchange="this.checked ? selectAllTrash() : (trashSelectedIdxs.clear(), document.getElementById('trash-select-label').textContent='항목을 선택하세요', document.getElementById('btn-trash-sel-del').disabled=true, renderTrashDrawer())" ${allChecked ? 'checked' : ''} style="width:15px;height:15px;cursor:pointer">
                전체 선택
            </label>
            <span style="font-size:10px;color:var(--text-muted)">${appState.trash.length}개</span>`;
        body.appendChild(selAllRow);
    }

    appState.trash.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = `trash-item${trashSelectedIdxs.has(idx) ? ' trash-selected' : ''}`;
        row.dataset.idx = idx;
        const d  = new Date(item.deletedAt);
        const ts = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
        const tl = {reservations:'예약', itinerary:'일정', packing:'짐싸기'}[item.fromTab] || item.fromTab;
        const sel = trashSelectedIdxs.has(idx);

        if (trashSelectActive) {
            row.innerHTML = `
                <div class="trash-check">${sel ? '✓' : ''}</div>
                <div class="trash-item-info">
                    <div class="trash-item-title">${item.title}</div>
                    <div class="trash-item-meta">${tl} · ${item.desc || ''} · ${ts}</div>
                </div>`;
            row.addEventListener('click', () => toggleTrashSelect(idx));
        } else {
            row.innerHTML = `
                <div class="trash-item-info">
                    <div class="trash-item-title">${item.title}</div>
                    <div class="trash-item-meta">${tl} · ${item.desc || ''} · ${ts}</div>
                </div>
                <div class="trash-item-actions">
                    <button class="btn-restore" onclick="event.stopPropagation();restoreTrash(${idx})">↩ 복구</button>
                    <button class="btn-perm-del" onclick="event.stopPropagation();permDel(${idx})">✕</button>
                </div>`;
        }
        body.appendChild(row);
    });
}

function restoreTrash(idx) {
    const item = appState.trash[idx]; if (!item) return;
    appState.trash.splice(idx, 1);
    trashSelectedIdxs.clear();
    const { fromTab:ft, fromCat:fc, fromIdx:fi, deletedAt:_, fromPrivate, ...task } = item;

    // fromPrivate=true → _private에 복구, 아니면 structure에 복구
    const targetStore = fromPrivate ? (appState[ft]._private || (appState[ft]._private = {})) : appState[ft].structure;
    if (!targetStore[fc]) targetStore[fc] = [];
    const val = targetStore[fc];
    if (Array.isArray(val)) {
        // 원래 인덱스로 복원. 현재 배열 길이를 초과하면 맨 끝에.
        const insertAt = (fi !== undefined) ? Math.min(fi, val.length) : val.length;
        val.splice(insertAt, 0, task);
    } else if (val && typeof val === 'object') {
        const dk = task._dk || '__plan_a__';
        if (!val[dk]) val[dk] = [];
        const planArr = val[dk];
        const insertAt = (fi !== undefined) ? Math.min(fi, planArr.length) : planArr.length;
        planArr.splice(insertAt, 0, task);
    }
    save(); updateTrashFab();
    if (appState.activeTab === ft) { renderContent(); updateProgress(); }
}
function permDel(idx) {
    appState.trash.splice(idx, 1);
    // 인덱스 재조정
    const newSet = new Set();
    trashSelectedIdxs.forEach(i => { if (i < idx) newSet.add(i); else if (i > idx) newSet.add(i-1); });
    trashSelectedIdxs = newSet;
    save(); updateTrashFab();
}
function emptyTrash() {
    if (!appState.trash.length) return;
    if (!confirm('휴지통을 완전히 비울까요? 복구할 수 없어요.')) return;
    appState.trash = []; trashSelectedIdxs.clear(); trashSelectActive = false;
    save(); updateTrashFab();
}

// ── DIALOG ────────────────────────────────────────────────
function openDlg(id)  { document.getElementById(id).classList.add('open'); }
function closeDlg(id) { document.getElementById(id).classList.remove('open'); }

window.onload = init;
</script>
